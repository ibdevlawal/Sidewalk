name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter sidewalk-api lint

      # --- NEW STEP STARTS HERE ---
      - name: Build dependencies
        run: pnpm --filter @sidewalk/stellar build
      # --- NEW STEP ENDS HERE ---

      - name: Type check
        run: pnpm --filter sidewalk-api typecheck

      - name: Build
        run: pnpm --filter sidewalk-api build

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter sidewalk-web lint

      - name: Type check
        run: pnpm --filter sidewalk-web typecheck

      - name: Build
        run: pnpm --filter sidewalk-web build

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter mobile lint

      - name: Type check
        run: pnpm --filter mobile typecheck

  stellar:
    name: Stellar package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @sidewalk/stellar lint
      - run: pnpm --filter @sidewalk/stellar typecheck
      - run: pnpm --filter @sidewalk/stellar build

  api-integration:
    name: API integration tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports: ['27017:27017']
      redis:
        image: redis:7
        ports: ['6379:6379']
    env:
      MONGO_URI: mongodb://localhost:27017/sidewalk_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
      STELLAR_SECRET_KEY: ci-test-key
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @sidewalk/stellar build
      - run: pnpm --filter sidewalk-api build
      - run: pnpm --filter sidewalk-api test

  lockfile-check:
    name: Enforce PNPM lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail on stray lockfiles
        run: |
          if find . -name "package-lock.json" -o -name "yarn.lock" | grep -v node_modules | grep .; then
            echo "Stray lockfiles found — use pnpm only"; exit 1
          fi
